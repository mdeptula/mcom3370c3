<script>
// Fix relative paths for pages in subdirectories
function fixNavPaths() {
    const isInSubdir = window.location.pathname.includes('/about/');
    if (isInSubdir) {
        document.querySelectorAll('a.nav-link').forEach(link => {
            const href = link.getAttribute('href');
            // Add ../ prefix only if it's not already there and not a hash link
            if (href && !href.startsWith('../') && !href.startsWith('http') && href !== 'index.html') {
                if (href.includes('#')) {
                    const [path, hash] = href.split('#');
                    link.setAttribute('href', '../' + path + '#' + hash);
                } else {
                    link.setAttribute('href', '../' + href);
                }
            } else if (href === 'index.html') {
                link.setAttribute('href', '../index.html');
            }
        });
    }
}

// Run on load
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', fixNavPaths);
} else {
    fixNavPaths();
}
</script>
